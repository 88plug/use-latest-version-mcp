name: Feature request
description: Propose an enhancement or new capability.
title: "feat: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Use this form for a capability change, not a bug report.
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What user problem does this solve?
      placeholder: What is missing or painful today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the smallest useful implementation.
      placeholder: What should the server, workflow, or docs do?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: List any other approaches you considered.
      placeholder: Other MCP tools, docs changes, workflow changes, etc.
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Links, screenshots, or examples that help.
