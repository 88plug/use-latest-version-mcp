name: Pages

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "README.md"
      - "docs/**"
      - "mkdocs.yml"
      - ".github/workflows/pages.yml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Build site
        shell: bash
        run: |
          set -euo pipefail

          if [ -f mkdocs.yml ]; then
            python -m pip install --upgrade pip mkdocs
            mkdocs build --site-dir site
            exit 0
          fi

          mkdir -p docs site
          cp README.md docs/index.md
          cat > mkdocs.yml <<'EOF'
          site_name: use-latest-version-mcp
          site_description: Fast, token-efficient MCP server for keeping package versions current
          nav:
            - Home: index.md
          EOF
          python -m pip install --upgrade pip mkdocs
          mkdocs build --site-dir site

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
