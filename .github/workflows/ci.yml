name: CI

on:
  push:
  pull_request:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  test:
    runs-on: ${{ vars.RUNNER || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@v7.0.0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Node test suites
        run: |
          set -e
          for t in \
            test-compatibility.js \
            test-conflict-resolver.js \
            test-project-scanner.js \
            test-server-factory.js \
            test-global-version-optimizer.js \
            test-write-path.js \
            test-dependency-parsers.js \
            test-lock-file-parsers.js; do
            echo "== $t =="
            node "$t"
          done

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Bun test suites
        run: bun test test-upgrade-applier.test.js test-upgrade-validator.test.js

  docs:
    runs-on: ${{ vars.RUNNER || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: actions/setup-python@v6.3.0
        with:
          python-version: "3.13"
      - name: Build docs (strict)
        run: |
          python -m pip install --upgrade pip mkdocs mkdocs-material
          mkdocs build --strict
