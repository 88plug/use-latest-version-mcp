changelog:
  categories:
    - title: Breaking changes
      labels:
        - breaking-change
        - major
    - title: Features
      labels:
        - feature
        - enhancement
    - title: Fixes
      labels:
        - bug
        - fix
    - title: Maintenance
      labels:
        - chore
        - docs
        - refactor
        - ci
        - test
        - build
    - title: Other changes
      labels:
        - "*"
  exclude:
    labels:
      - skip-changelog
      - dependencies
      - release
    authors:
      - dependabot[bot]
